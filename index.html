<main>
  <h2>Review a Decision</h2>

  <label for="decisionTitle">Decision Title</label>
  <input
    id="decisionTitle"
    type="text"
    placeholder="Example: Should we adopt AI for customer support?"
  >

  <label for="decisionContext">Decision Context</label>
  <textarea
    id="decisionContext"
    placeholder="Describe the situation, problem, and why a decision is needed."
  ></textarea>

  <label for="objective">Desired Outcome</label>
  <textarea
    id="objective"
    placeholder="What should this decision achieve?"
  ></textarea>

  <label for="evidence">Available Evidence</label>
  <textarea
    id="evidence"
    placeholder="What facts, data, or research support this decision?"
  ></textarea>

  <label for="risks">Key Risks</label>
  <textarea
    id="risks"
    placeholder="What could go wrong, and who could be affected?"
  ></textarea>

  <label for="alternatives">Alternatives Considered</label>
  <textarea
    id="alternatives"
    placeholder="What other options have been considered?"
  ></textarea>

  <label for="stakeholders">Affected Stakeholders</label>
  <input
    id="stakeholders"
    type="text"
    placeholder="Employees, customers, regulators, partners..."
  >

  <label for="owner">Decision Owner</label>
  <input
    id="owner"
    type="text"
    placeholder="Who is accountable for the decision?"
  >

  <button id="reviewBtn">Review Decision</button>

  <section id="result" class="result hidden"></section>
</main>
