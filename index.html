<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Decision Quality Lab</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Decision Quality Lab</h1>

<p>
Improve important business decisions through structured reasoning,
risk assessment, governance, and human judgment.
</p>
</header>

<main>

<h2>Review a Decision</h2>

<label>Decision Title</label><br>
<input type="text" placeholder="Example: Should we adopt AI for customer support?">

<br><br>

<label>Decision Context</label><br>
<textarea placeholder="Describe your decision..."></textarea>

<br><br>

<button id="reviewBtn">Review Decision</button>

<section id="result" class="result hidden"></section>

</main>

<script src="app.js"></script>

</body>
</html>
